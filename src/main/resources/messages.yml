auto:
  - '<gradient:yellow:white>Скучно одному? Найди с кем поиграть в нашем <click:open_url:"https://t.me/LisyakChat><u>Telegram</u>!</click>'
  - '<gradient:gold:white>Безработные деревенские жители ложатся и встают позже остальных.'
  - '<gradient:green:white>Кофе — только один из многих режимов, которые запланированы!'
  - '<gradient:blue:white>На самом деле, у снеговиков есть лицо за маской из тыквы.'
  - '<gradient:green:white>Если дать большому или среднему слизню имя биркой, то маленькие слизни, которые появятся из него, сохранят это имя!'
  - '<gradient:red:white>А вы знали, что тут можно ползать? /crawl'
  - '<gradient:blue:white>Многие из плагинов сервера будут или уже выложены на GitHub!'
  - '<gradient:dark_green:white>Железные прутья и кровати ускоряют лечение жителей'
  - '<gradient:gold:white>Озвучка в хабе активно переделывается — в том числе, для поддержки Bedrock!'
  - '<gradient:red:white>Когда Призыватели видят синих овец в определенном радиусе блоков, они выпускают оранжевые частицы и красят им шерсть в красный цвет.'
  - '<gradient:green:white>У проекта есть свой лаунчер, который создавали с конца 2023 года, перепробовав 7 языков программирования!'
  - '<gradient:gold:green>Если назвать кролика "Тост", то он будет черно-белым в пятнышках — в память о пропавшем кролике подруги Reddit пользователя xyzen420.'
  - '<gradient:gray:white>Тсс... А вы правила то читали? <click:open_url:"https://лисяк.рф/LisyakRules.pdf"><u>Клик сюда!</u></click>'
  - '<gradient:blue:white>Игроки могут лечь спать на 32 игровые минуты раньше, если идет дождь. 32 игровые минуты — это 28 секунд!'
  - '<gradient:red:white>Кстати, кому интересно, сид мира — <obf>чё,правда-поверил?'
  - '<gradient:dark_red:red>В ранних версиях Minecraft жителей называли свидетелями.'
  - '<gradient:dark_green:white>Поменять скин можно командой /skin, все просто!'
  - '<gradient:light_purple:white>У Minecraft была версия, где можно было призвать дракона, слепив морду крипера из глины. Она продержалась около 13 недель.'
  - '<gradient:gold:white>Создавая данный сервер, автор вдохновлялся грибами (лисичками)'
  - '<gradient:aqua:white>На сегодня, в вайтлисте Кофе около 40 человек. Хм, и где же они все?'
  - '<gradient:gold:white>Разбойники пускаются в победный танец, если выигрывают рейд.'
  - '<gradient:light_purple:white>Есть идеи, предложения или пожелания маме админа? <click:open_url:"https://t.me/LisyakChat><u>Напиши нам!</u></click>'
  - '<gradient:gold:white>Мёд — единственный продукт питания, который практически не портится со временем: в гробницах Древнего Египта находили мёд возрастом более 3 000 лет, и он всё ещё был пригоден в пищу.'
  - '<rainbow>Данный сервер полностью соблюдает законы Российской Федерации.'
  - '<gradient:gold:white>Текстура досок на обратной стороне картин не совпадает ни с одним видом досок в игре, и никогда не совпадала.'
  - '<gradient:gray:white>Самая первая версия Minecraft называлась "Cave Game" (Игра в Пещеры)'
  - '<gradient:aqua:white>Кстати, сервер работает и на Bedrock Edition, но предметы из модов не будут работать!'
  - '<gradient:red:white>Зелья с замедленным эффектом рассеиваются быстрее, если игрок или моб находится в зоне действия.'
  - '<gradient:dark_red:gray>А вы слышали, что на сервере обитает херобрин?...'
  - '<gradient:gold:white>Mojang устраивали голосование на добавление нового типа котов в игру, и победителем стал Джелли, кот ютубера GoodTimesWithScar.'
